/**:
  ros__parameters:
    # Model parameters
    model:
      repo: ggml-org/gpt-oss-20b-GGUF
      filename: gpt-oss-20b-mxfp4.gguf

    # Context / inference parameters
    context:
      n_ctx: 4096
      n_batch: 8
      n_predict: 4096

    # GPU / backend parameters
    gpu:
      n_gpu_layers: 0

    # CPU parameters
    cpu:
      n_threads: 1

    # Prompt & chat parameters
    prompt:
      system_prompt_type: GPT
