/**:
  ros__parameters:
    # Model parameters
    model:
      repo: bartowski/Phi-3.5-mini-instruct-GGUF
      filename: Phi-3.5-mini-instruct-Q4_K_M.gguf

    # Context / inference parameters
    context:
      n_ctx: 2048
      n_batch: 8
      n_predict: 2048

    # GPU / backend parameters
    gpu:
      n_gpu_layers: 0

    # CPU parameters
    cpu:
      n_threads: 1

    # Prompt & chat parameters
    prompt:
      system_prompt_type: Phi-3

    # LoRA adapter parameters
    lora:
      adapters:
      - code_writer
      - summarization
      code_writer:
        repo: zhhan/adapter-Phi-3-mini-4k-instruct_code_writing
        filename: Phi-3-mini-4k-instruct-adaptor-f16-code_writer.gguf
        scale: 0.5
      summarization:
        repo: zhhan/adapter-Phi-3-mini-4k-instruct_summarization
        filename: Phi-3-mini-4k-instruct-adaptor-f16-summarization.gguf
        scale: 0.5
