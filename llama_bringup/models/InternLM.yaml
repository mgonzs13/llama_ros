/**:
  ros__parameters:
    # Model parameters
    model:
      repo: internlm/internlm2_5-7b-chat-gguf
      filename: internlm2_5-7b-chat-q4_k_m.gguf

    # Context / inference parameters
    context:
      n_ctx: 2048
      n_batch: 8
      n_predict: 2048

    # GPU / backend parameters
    gpu:
      n_gpu_layers: 0

    # CPU parameters
    cpu:
      n_threads: 1

    # Prompt & chat parameters
    prompt:
      system_prompt_type: ChatML
